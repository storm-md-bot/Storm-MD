<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storm-MD v2.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 800px;
    }
    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(45deg, #f093fb, #f5576c, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .version {
      color: #888;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
    .status {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid rgba(0, 255, 0, 0.3);
      color: #00ff88;
      margin-bottom: 2rem;
    }
    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #00ff88;
      border-radius: 50%;
      margin-right: 8px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }
    .info-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 1.5rem;
      transition: transform 0.3s;
    }
    .info-card:hover { transform: translateY(-5px); }
    .info-card .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .info-card h3 { font-size: 1rem; color: #aaa; margin-bottom: 0.5rem; }
    .info-card p { font-size: 1.2rem; font-weight: bold; }
    .footer {
      margin-top: 3rem;
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚡</div>
    <h1>Storm-MD</h1>
    <p class="version">v2.0.0 — Advanced WhatsApp Multi-Device Bot</p>
    
    <div class="status">
      <span class="status-dot"></span>
      Bot is ONLINE
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="icon">📱</div>
        <h3>Device</h3>
        <p>Kali Linux</p>
      </div>
      <div class="info-card">
        <div class="icon">⚡</div>
        <h3>Commands</h3>
        <p>1000+</p>
      </div>
      <div class="info-card">
        <div class="icon">🛠️</div>
        <h3>Tools</h3>
        <p>30+</p>
      </div>
      <div class="info-card">
        <div class="icon">🤖</div>
        <h3>AI</h3>
        <p>Enabled</p>
      </div>
      <div class="info-card">
        <div class="icon">⏱️</div>
        <h3>Uptime</h3>
        <p>24/7</p>
      </div>
      <div class="info-card">
        <div class="icon">🔗</div>
        <h3>Status</h3>
        <p>Connected ✅</p>
      </div>
    </div>
    
    <p class="footer">🔥 Made with ❤️ | Storm-MD v2.0 | 24/7 Running</p>
  </div>
</body>
  </html>
